name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compilar con PyInstaller
        run: pyinstaller --noconfirm --onefile --windowed --name "TranscriptorLocal" --collect-data faster_whisper --collect-all ctranslate2 --collect-all tokenizers app.py

      - name: Precargar modelos (large-v3 y medium)
        run: |
          mkdir dist\models
          python -c "from faster_whisper import WhisperModel; WhisperModel('large-v3', device='cpu', compute_type='int8', download_root='dist/models')"
          python -c "from faster_whisper import WhisperModel; WhisperModel('medium', device='cpu', compute_type='int8', download_root='dist/models')"

      - name: Subir ejecutable + modelo como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: TranscriptorLocal-Windows
          path: dist
