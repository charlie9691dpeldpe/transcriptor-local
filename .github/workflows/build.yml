name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar PyTorch con CUDA embebido
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cu128

      - name: Instalar dependencias restantes
        run: pip install -r requirements.txt

      - name: Compilar con PyInstaller
        run: pyinstaller --noconfirm --onedir --windowed --name "TranscriptorLocal" --collect-data whisper --collect-all torch --collect-all tiktoken app.py

      - name: Subir carpeta de la app como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: TranscriptorLocal-Windows
          path: dist/TranscriptorLocal
