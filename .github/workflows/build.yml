name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar PyTorch con CUDA embebido
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cu124

      - name: Instalar dependencias restantes
        run: pip install -r requirements.txt

      - name: Compilar con PyInstaller
        run: pyinstaller --noconfirm --onefile --windowed --name "TranscriptorLocal" --collect-data whisper --collect-all torch --collect-all tiktoken app.py

      - name: Precargar modelos (large-v3 y medium)
        run: |
          mkdir dist\models
          python -c "import whisper; whisper.load_model('large-v3', download_root='dist/models')"
          python -c "import whisper; whisper.load_model('medium', download_root='dist/models')"

      - name: Subir ejecutable + modelo como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: TranscriptorLocal-Windows
          path: dist
